<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="6" fill="#2563eb"/>
  <!-- Top box (client) -->
  <rect x="11" y="3" width="10" height="6" rx="1.5" fill="white"/>
  <!-- Bottom-left box (server) -->
  <rect x="3" y="21" width="10" height="6" rx="1.5" fill="white"/>
  <!-- Bottom-right box (database) -->
  <rect x="19" y="21" width="10" height="6" rx="1.5" fill="white"/>
  <!-- Lines connecting boxes -->
  <line x1="13" y1="9" x2="8" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="9" x2="24" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="24" x2="19" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
